  document.getElementById("sSessions").textContent=sessions;
  document.getElementById("scStart").style.display="none";
  document.getElementById("scExam").style.display="block";
  const dots=document.getElementById("progDots");
  dots.innerHTML=examQs.map((_,i)=>`<div class="pdot${i===0?" now":""}" id="pd${i}" onclick="goQ(${i})" title="問${i+1}"></div>`).join("");
  if(timeM>0){document.getElementById("hdTimer").style.display="block";startTimer();}
  renderQ(0);
}

function startTimer(){
  timerID=setInterval(()=>{
    secsLeft--;
    const m=String(Math.floor(secsLeft/60)).padStart(2,"0");
    const s=String(secsLeft%60).padStart(2,"0");
    const el=document.getElementById("hdTimer");
    el.textContent=`${m}:${s}`;
    if(secsLeft<=300)el.classList.add("danger");
    if(secsLeft<=0){clearInterval(timerID);submitExam();}
  },1000);
}

function hi(code){
  if(!code)return"";
  let s=code.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  s=s.replace(/□□/g,'<span class="blank-box"> a </span>');
  s=s
    .replace(/\b(if|elseif|else|endif|while|endwhile|do|for|endfor|return|and|or|not|true|false|mod)\b/g,'<span class="kw">$1</span>')
    .replace(/(\/\*[\s\S]*?\*\/|\/\/[^\n]*)/g,'<span class="cm">$1</span>')
    .replace(/(○[^(\n]+)/g,'<span class="fn">$1</span>')
    .replace(/&quot;([^&]*)&quot;/g,'<span class="str">&quot;$1&quot;</span>')
    .replace(/\b(\d+)\b/g,'<span class="num">$1</span>');
  return s;
}

function renderQ(idx){
  cur=idx;
  const q=examQs[idx];
  const total=examQs.length;
  const answered=userAns[idx]!==null;
  document.getElementById("qhNum").textContent=`問${idx+1}`;
  document.getElementById("qhCat").textContent=q.category;
  document.getElementById("qhType").textContent={blank:"穴埋め",trace:"トレース",bug:"バグ発見"}[q.type]||q.type;
  const diffEl=document.getElementById("qhDiff");
  const dm={easy:["易","diff-easy"],medium:["標準","diff-medium"],hard:["難","diff-hard"]};
  const[dl,dc]=dm[q.difficulty]||["","diff-medium"];
  diffEl.textContent=dl;diffEl.className=`qh-diff ${dc}`;
  document.getElementById("progLabel").textContent=`問${idx+1} / ${total}`;
  document.getElementById("progFill").style.width=`${((idx+1)/total)*100}%`;
  document.getElementById("qLead").innerHTML=(q.lead||"").replace(/\n/g,"<br>").replace(/□□/g,'<span class="blank-box"> a </span>');
  document.getElementById("qHint").textContent=q.blankHint||"";
  const qc=document.getElementById("qCode");
  const stripped=(q.pseudoCode||"").replace(/\/\*[\s\S]*?\*\//g,"").replace(/\/\/[^\n]*/g,"").trim();
  qc.innerHTML=stripped?`<div class="pcode-wrap"><div class="pcode-header">〔プログラム〕</div><pre class="pcode-body">${hi(q.pseudoCode)}</pre></div>`:"";
  const entries=Object.entries(q.options||{});
  const isGrid=entries.length>=5&&entries.some(([,v])=>v.includes("，")&&v.length>12);
  const og=document.getElementById("qOpts");
  og.innerHTML=`<div class="opts${isGrid?" grid2":""}">${entries.map(([k,v])=>{
    let cls="opt";
    if(userAns[idx]===k)cls+=" sel";
    if(answered&&k===q.answer)cls+=" ok";
    if(answered&&userAns[idx]===k&&k!==q.answer)cls+=" ng";
    if(answered)cls+=" locked";
    return`<div class="${cls}" onclick="pick(${idx},'${k}')"><div class="opt-key">${k}</div><div class="opt-val">${v.replace(/\n/g,"<br>")}</div></div>`;
  }).join("")}</div>`;
  const eb=document.getElementById("expBox");
  if(answered){
    const ok=userAns[idx]===q.answer;
    document.getElementById("expAns").textContent=`正解：${q.answer}`;
    document.getElementById("expResult").textContent=ok?"  ✅ 正解！":"  ❌ 不正解";
    document.getElementById("expBody").textContent=q.explanation||"";
    eb.classList.add("show");
  }else{eb.classList.remove("show");}
  document.querySelectorAll(".pdot").forEach((d,i)=>{
    d.className="pdot";
    if(i===idx)d.classList.add("now");
    else if(userAns[i]!==null)d.classList.add("done");
  });
  document.getElementById("btnPrev").disabled=idx===0;
  document.getElementById("btnNext").style.display=idx===total-1?"none":"block";
  document.getElementById("btnSubmit").style.display=idx===total-1?"block":"none";
}

function pick(idx,key){if(userAns[idx]!==null)return;userAns[idx]=key;renderQ(idx);}
function prevQ(){if(cur>0)renderQ(cur-1);}
function nextQ(){if(cur<examQs.length-1)renderQ(cur+1);}
function goQ(i){renderQ(i);}

function submitExam(){
  clearInterval(timerID);
  document.getElementById("hdTimer").style.display="none";
  document.getElementById("scExam").style.display="none";
  const elapsed=Math.floor((Date.now()-startTime)/1000);
  const em=String(Math.floor(elapsed/60)).padStart(2,"0");
  const es=String(elapsed%60).padStart(2,"0");
  let ok=0,ng=0,sk=0;
  examQs.forEach((q,i)=>{if(userAns[i]===null)sk++;else if(userAns[i]===q.answer)ok++;else ng++;});
  const n=examQs.length,pct=ok/n,pass=pct>=0.6;
  document.getElementById("rScore").innerHTML=`${ok}<span> / ${n}問</span>`;
  const rb=document.getElementById("rBadge");
  rb.textContent=pass?"合格ライン達成！":"合格ラインに届かず";
  rb.className="result-badge "+(pass?"pass":"fail");
  document.getElementById("rSub").textContent=`正答率 ${Math.round(pct*100)}%（合格ライン 60% = ${Math.ceil(n*0.6)}問以上）`;
  document.getElementById("rC").textContent=ok;
  document.getElementById("rW").textContent=ng;
  document.getElementById("rS").textContent=sk;
  document.getElementById("rT").textContent=`${em}:${es}`;
  const dl={easy:"易",medium:"標準",hard:"難"};
  document.getElementById("revBody").innerHTML=examQs.map((q,i)=>{
    const ua=userAns[i]||"—";
    let s=`<span class="s-sk">未回答</span>`;
    if(userAns[i]===q.answer)s=`<span class="s-ok">✓ 正解</span>`;
    else if(userAns[i]!==null)s=`<span class="s-ng">✗ 不正解</span>`;
    return`<tr><td style="font-family:'Source Code Pro',monospace;font-weight:700;color:var(--blue)">問${i+1}</td><td>${q.category}</td><td>${dl[q.difficulty]||"—"}</td><td style="font-family:'Source Code Pro',monospace">${ua}</td><td style="font-family:'Source Code Pro',monospace;color:var(--green);font-weight:700">${q.answer}</td><td>${s}</td></tr>`;
  }).join("");
  document.getElementById("scResult").style.display="block";
  window.scrollTo({top:0,behavior:"smooth"});
}

function retryExam(){document.getElementById("scResult").style.display="none";startExam();}
function backToStart(){
  document.getElementById("scResult").style.display="none";
  document.getElementById("hdTimer").textContent="100:00";
  document.getElementById("hdTimer").classList.remove("danger");
  document.getElementById("scStart").style.display="flex";
}
</script>
</body>
</html>
